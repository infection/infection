name: Docker

on:
  pull_request:
    paths:
      - Makefile
      - devTools/sbx/**
  push:
    branches:
      - main
      - master
  release:

concurrency:
  group: ${{ github.workflow }}-${{ github.head_ref || github.run_id }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  sbx-image:
    name: Build and Test Docker Sandbox Image (${{ matrix.platform }})
    runs-on: ubuntu-latest
    timeout-minutes: 10

    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: linux/amd64
            cache-scope: sbx-image-linux-amd64
          - platform: linux/arm64
            cache-scope: sbx-image-linux-arm64

    env:
      CONTAINER_STRUCTURE_TEST_VERSION: 1.22.1
      DOCKER_BUILDKIT: 1
      IMAGE_PLATFORM: ${{ matrix.platform }}
      IMAGE_CACHE_FROM: type=gha,scope=${{ matrix.cache-scope }}
      IMAGE_CACHE_TO: type=gha,mode=max,ignore-error=true,scope=${{ matrix.cache-scope }}

    steps:
      - name: Checkout code
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Set up QEMU
        uses: docker/setup-qemu-action@ce360397dd3f832beb865e1373c09c0e9f86d70a # v4.0.0

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@8d2750c68a42422c14e847fe6c8ac0403b4cbd6f # v3.12.0

      # This is necessary for Buildx to be able to cache images.
      - name: Expose GitHub runtime for Buildx cache
        uses: crazy-max/ghaction-github-runtime@04d248b84655b509d8c44dc1d6f990c879747487 # v4.0.0

      - name: Build and test the Docker sandbox image
        run: ./devTools/sbx/build-image.sh

  # This is a meta job to avoid to have to constantly change the protection rules
  # whenever we touch the matrix.
  sbx-image-status:
    name: Docker Sandbox Image Status
    runs-on: ubuntu-latest
    timeout-minutes: 5
    needs: sbx-image
    if: always()
    steps:
      - name: Successful run
        if: ${{ !contains(needs.*.result, 'failure') && !contains(needs.*.result, 'cancelled') && !contains(needs.*.result, 'skipped') }}
        run: exit 0

      - name: Failing run
        if: ${{ contains(needs.*.result, 'failure') || contains(needs.*.result, 'cancelled') || contains(needs.*.result, 'skipped') }}
        run: exit 1
