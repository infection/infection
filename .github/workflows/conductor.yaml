# See the Conductor setup guide at https://packagist.com/docs/conductor/getting-started

on:
  repository_dispatch:
    types:
      - dependency_update

name: Private Packagist Conductor

permissions:
  contents: write

jobs:
  conductor:
    name: Private Packagist Conductor
    runs-on: "ubuntu-latest"
    timeout-minutes: 30
    env:
      COMPOSER_AUTH: ${{ secrets.CONDUCTOR_COMPOSER_AUTH }}

    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Install PHP
        uses: "shivammathur/setup-php@accd6127cb78bee3e8082180cb391013d204ef9f" # master
        with:
          php-version: "8.3"

      - name: "Running Conductor"
        uses: packagist/conductor-github-action@e19c62f9d97caff6166604942962597e412e01d8 # 1.6.0
