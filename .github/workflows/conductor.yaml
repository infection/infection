# See the Conductor setup guide at https://packagist.com/docs/conductor/getting-started

on:
  repository_dispatch:
    types:
      - dependency_update

name: Private Packagist Conductor

permissions:
  contents: write

jobs:
  conductor:
    name: Private Packagist Conductor
    runs-on: "ubuntu-latest"
    timeout-minutes: 30
    env:
      COMPOSER_AUTH: ${{ secrets.CONDUCTOR_COMPOSER_AUTH }}

    steps:
      - name: Checkout
        # zizmor: ignore[artipacked] Conductor updates dependencies and needs the checkout token persisted for repository writes.
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Install PHP
        uses: "shivammathur/setup-php@7c071dfe9dc99bdf297fa79cb49ea005b9fcadbc" # master
        with:
          php-version: "8.3"
          extensions: grpc

      - name: "Running Conductor"
        uses: packagist/conductor-github-action@e19c62f9d97caff6166604942962597e412e01d8 # 1.6.0
