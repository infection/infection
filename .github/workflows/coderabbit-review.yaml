name: CodeRabbit Review

on:
  workflow_dispatch:
    inputs:
      review-type:
        description: Type of CodeRabbit review to request
        required: true
        default: incremental
        type: choice
        options:
          - incremental
          - full

permissions:
  contents: read
  issues: write
  pull-requests: read

jobs:
  request-review:
    name: Request CodeRabbit review
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      - name: Request CodeRabbit review
        env:
          GH_TOKEN: ${{ secrets.CODERABBIT_REVIEW_TOKEN || secrets.GITHUB_TOKEN }}
          REVIEW_TYPE: ${{ inputs.review-type }}
          REPOSITORY: ${{ github.repository }}
          BRANCH: ${{ github.ref_name }}
        run: |
          # Infer the PR number from the branch name; A GitHub Actions manual
          # workflow does not have access to the PR payload.
          pr_number="$(
            gh pr list \
              --repo "$REPOSITORY" \
              --head "$BRANCH" \
              --state open \
              --json number \
              --jq 'if length == 1 then .[0].number else error("Expected exactly one open PR for branch " + env.BRANCH) end'
          )"

          if [[ "$REVIEW_TYPE" == "full" ]]; then
            body="@coderabbitai full review"
          else
            body="@coderabbitai review"
          fi

          gh api "repos/$REPOSITORY/issues/$pr_number/comments" \
            --field "body=$body"
