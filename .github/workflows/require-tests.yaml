name: 'Require tests if source code is changed'

on:
  pull_request_target: # zizmor: ignore[dangerous-triggers] This workflow does not checkout or execute PR code; it only reviews changed file names.
    types: [opened]

permissions:
  pull-requests: write

jobs:
  check:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: infection/tests-checker-action@d7c206b02342e492c91440a1234f8317ee316d8a # v1.0.3
        with:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
