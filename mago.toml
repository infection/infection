# Welcome to Mago!
# For full documentation, see https://mago.carthage.software/tools/overview
version = "1"
php-version = "8.3.0"

[source]
workspace = "."
paths = [
    "src",
    "tests/autoloaded",
    "tests/benchmark",
    "tests/phpunit"
]
includes = ["vendor"]
excludes = [
    "src/FileSystem/DummyFileSystem.php",
    "src/CustomMutator/templates",
    "tests/benchmark/MutationGenerator/sources",
    "tests/benchmark/Tracing/benchmark-source",
    "tests/benchmark/Tracing/coverage",
    "tests/benchmark/Tracing/sources",
    "tests/phpunit/Fixtures",
    "tests/phpunit/Command/Debug/DumpAstCommand/Greeter.php",
    "tests/phpunit/Command/Debug/DumpAstCommand/EchoGreeter.php",
    "tests/phpunit/Mutation/FileMutationGenerator/Fixtures",
    "tests/phpunit/PhpParser/Visitor/EnrichmentTraverse/Fixtures",
]

[source.glob]
literal-separator = true

[linter]
integrations = ["symfony", "phpunit"]

[linter.rules]
ambiguous-function-call = { enabled = false }
literal-named-argument = { enabled = false }
halstead = { effort-threshold = 7000 }

[analyzer]
baseline = "devTools/mago-baseline.toml"
minimum-fail-level = "warning"
plugins = []
find-unused-definitions = true
find-unused-expressions = true
analyze-dead-code = true
memoize-properties = true
allow-possibly-undefined-array-keys = true
check-throws = true
unchecked-exceptions = [
    "LogicException",
    "Error",
    "PHPUnit\\Exception",
    "Psr\\Container\\ContainerExceptionInterface",
    "Safe\\Exceptions\\SafeExceptionInterface",
]
check-missing-override = false
find-unused-parameters = true
strict-list-index-checks = false
no-boolean-literal-comparison = true
check-missing-type-hints = true
register-super-globals = true